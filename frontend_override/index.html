<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Генератор описаний</title>
  <meta name="description" content="Генератор описаний товаров." />

  <style>
    :root{
      --bg0:#060812;
      --bg1:#0b1024;
      --card: rgba(255,255,255,.06);
      --card2: rgba(255,255,255,.10);
      --stroke: rgba(255,255,255,.12);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.68);
      --muted2: rgba(255,255,255,.55);
      --accent:#7c3aed;
      --accent2:#22c55e;
      --danger:#ef4444;
      --shadow: 0 18px 60px rgba(0,0,0,.45);
      --radius: 18px;
      --radius2: 26px;
      --focus: 0 0 0 4px rgba(124,58,237,.25);
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color: var(--text);
    }

    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(1200px 700px at 10% 10%, rgba(124,58,237,.35), transparent 55%),
        radial-gradient(1000px 600px at 85% 15%, rgba(34,197,94,.26), transparent 55%),
        radial-gradient(900px 700px at 70% 80%, rgba(59,130,246,.18), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      overflow-x:hidden;
    }

    .glow{
      position:fixed;
      inset:-20%;
      background:
        radial-gradient(closest-side, rgba(124,58,237,.14), transparent 55%),
        radial-gradient(closest-side, rgba(34,197,94,.11), transparent 60%);
      filter: blur(40px);
      animation: drift 18s ease-in-out infinite alternate;
      pointer-events:none;
      z-index:-1;
    }
    @keyframes drift{
      0%{ transform: translate3d(-2%, -1%, 0) scale(1.02); }
      100%{ transform: translate3d(2%, 2%, 0) scale(1.08); }
    }

    .wrap{
      max-width: 1120px;
      margin: 0 auto;
      padding: 26px 18px 48px;
      animation: pageIn .55s ease-out both;
    }
    @keyframes pageIn{
      from{ opacity:0; transform: translateY(10px); }
      to{ opacity:1; transform: translateY(0); }
    }

    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      margin-bottom: 18px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }
    .logo{
      width:42px;height:42px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(124,58,237,.95), rgba(34,197,94,.85));
      box-shadow: 0 10px 30px rgba(124,58,237,.25);
      display:grid; place-items:center;
      transform: translateZ(0);
      position:relative;
      overflow:hidden;
    }
    .logo:before{
      content:"";
      position:absolute;
      inset:-40%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.55), transparent 45%);
      transform: rotate(15deg);
      animation: shine 2.8s ease-in-out infinite;
      opacity:.55;
    }
    @keyframes shine{
      0%,100%{ transform: translateX(-12%) rotate(15deg); opacity:.35; }
      50%{ transform: translateX(12%) rotate(15deg); opacity:.65; }
    }
    .logo svg{ position:relative; z-index:1; opacity:.95; }

    .titleBlock h1{
      margin:0;
      font-size: 20px;
      letter-spacing: .2px;
      line-height:1.1;
    }

    .pill{
      display:flex;
      gap:10px;
      align-items:center;
      padding:10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.05);
      border:1px solid var(--stroke);
      backdrop-filter: blur(10px);
    }
    .pill small{ color: var(--muted2); }
    .dot{
      width:10px;height:10px;border-radius:99px;
      background: var(--accent2);
      box-shadow: 0 0 0 6px rgba(34,197,94,.14);
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse{
      0%,100%{ transform: scale(1); opacity: .95; }
      50%{ transform: scale(1.15); opacity: .75; }
    }

    .grid{
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 16px;
    }
    @media (max-width: 980px){
      .grid{ grid-template-columns: 1fr; }
    }

    .card{
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: var(--radius2);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      padding: 16px;
      position:relative;
      overflow:hidden;
    }
    .card:before{
      content:"";
      position:absolute;
      inset:-1px;
      background: radial-gradient(800px 240px at 20% 0%, rgba(124,58,237,.18), transparent 60%);
      pointer-events:none;
    }

    .cardHead{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom: 12px;
      position:relative;
    }
    .cardHead h2{
      margin:0;
      font-size: 14px;
      letter-spacing:.2px;
      color: rgba(255,255,255,.92);
    }
    .cardHead .sub{
      margin-top:6px;
      font-size:12px;
      color: var(--muted);
    }

    .tabs{
      display:flex;
      gap:8px;
      background: rgba(255,255,255,.05);
      border:1px solid var(--stroke);
      border-radius: 999px;
      padding:6px;
      width: fit-content;
      position:relative;
      flex-wrap: wrap;
      justify-content:flex-end;
    }
    .tab{
      border:0;
      background: transparent;
      color: var(--muted);
      padding: 10px 12px;
      border-radius: 999px;
      cursor:pointer;
      font-weight: 700;
      font-size: 13px;
      transition: .18s ease;
      display:flex;
      align-items:center;
      gap:8px;
      white-space: nowrap;
    }
    .tab svg{ opacity:.85; }
    .tab.active{
      background: linear-gradient(135deg, rgba(124,58,237,.95), rgba(99,102,241,.65));
      color: white;
      box-shadow: 0 10px 28px rgba(124,58,237,.25);
    }
    .tab:hover{ transform: translateY(-1px); }

    .form{
      display:grid;
      gap: 12px;
      margin-top: 12px;
      position:relative;
    }
    .row{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
    }
    @media (max-width: 560px){
      .row{ grid-template-columns: 1fr; }
    }

    label{
      display:block;
      font-size: 12px;
      color: var(--muted);
      margin: 0 0 6px;
    }
    input, select, textarea{
      width:100%;
      box-sizing:border-box;
      border-radius: 14px;
      border: 1px solid var(--stroke);
      background: rgba(0,0,0,.18);
      color: var(--text);
      padding: 11px 12px;
      outline:none;
      transition: .18s ease;
    }
    input:focus, select:focus, textarea:focus{
      box-shadow: var(--focus);
      border-color: rgba(124,58,237,.45);
      transform: translateY(-1px);
    }
    input::placeholder, textarea::placeholder{ color: rgba(255,255,255,.35); }

    .btnRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top: 6px;
    }
    .btn{
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.88);
      padding: 11px 14px;
      border-radius: 16px;
      cursor:pointer;
      font-weight: 800;
      font-size: 13px;
      transition: .18s ease;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .btn:hover{ transform: translateY(-1px); background: rgba(255,255,255,.10); }
    .btn:active{ transform: translateY(0); }
    .btn.primary{
      border-color: rgba(124,58,237,.35);
      background: linear-gradient(135deg, rgba(124,58,237,.95), rgba(59,130,246,.75));
      color: #fff;
      box-shadow: 0 16px 40px rgba(124,58,237,.24);
    }
    .btn.primary:hover{ filter: brightness(1.02); }
    .btn.danger{
      border-color: rgba(239,68,68,.35);
      background: rgba(239,68,68,.10);
      color: rgba(255,255,255,.9);
    }

    .spinner{
      width:16px;height:16px;
      border-radius:99px;
      border: 2px solid rgba(255,255,255,.25);
      border-top-color: rgba(255,255,255,.95);
      animation: spin .7s linear infinite;
      display:none;
    }
    @keyframes spin{ to{ transform: rotate(360deg); } }

    .status{
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      min-height: 18px;
    }
    .status.ok{ color: rgba(34,197,94,.95); }
    .status.err{ color: rgba(239,68,68,.95); }

    .outputBox{
      border-radius: var(--radius2);
      border:1px solid var(--stroke);
      background: rgba(0,0,0,.18);
      padding: 14px;
      position:relative;
      overflow:hidden;
    }
    .outputTitle{
      font-weight: 900;
      font-size: 14px;
      margin: 0 0 10px;
      color: rgba(255,255,255,.92);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .outputText{
      white-space: pre-wrap;
      line-height: 1.55;
      color: rgba(255,255,255,.86);
      font-size: 14px;
      min-height: 80px;
    }

    .shimmer{
      position:absolute;
      inset:0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.10), transparent);
      transform: translateX(-100%);
      animation: shimmer 1.1s ease-in-out infinite;
      display:none;
      pointer-events:none;
    }
    @keyframes shimmer{
      0%{ transform: translateX(-100%); }
      100%{ transform: translateX(100%); }
    }

    .history{
      margin-top: 12px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .historyTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .historyTop select{
      max-width: 220px;
      background: rgba(0,0,0,.18);
    }
    .hList{
      display:flex;
      flex-direction:column;
      gap:10px;
      max-height: 420px;
      overflow:auto;
      padding-right: 4px;
    }
    .hItem{
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,.05);
      border-radius: 16px;
      padding: 12px;
      cursor:pointer;
      transition: .16s ease;
      animation: pop .32s ease both;
    }
    @keyframes pop{ from{ opacity:0; transform: translateY(6px);} to{ opacity:1; transform: translateY(0);} }
    .hItem:hover{ transform: translateY(-1px); background: rgba(255,255,255,.08); }
    .hMeta{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      margin-bottom: 6px;
    }
    .badge{
      font-size: 11px;
      padding: 5px 10px;
      border-radius: 999px;
      border:1px solid var(--stroke);
      background: rgba(0,0,0,.18);
      color: var(--muted);
      white-space:nowrap;
    }
    .hText{
      font-size: 12px;
      color: rgba(255,255,255,.78);
      line-height: 1.4;
      display:-webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow:hidden;
    }

    .toast{
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: min(360px, calc(100vw - 36px));
      border-radius: 18px;
      border: 1px solid var(--stroke);
      background: rgba(0,0,0,.35);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      padding: 12px 12px;
      transform: translateY(16px);
      opacity:0;
      pointer-events:none;
      transition: .22s ease;
    }
    .toast.show{ opacity:1; transform: translateY(0); }
    .toast .tTitle{ font-weight: 900; font-size: 13px; margin-bottom: 4px; }
    .toast .tText{ font-size: 12px; color: var(--muted); line-height: 1.35; }
  </style>
</head>

<body>
  <div class="glow"></div>

  <div class="wrap">
    <header>
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M12 2l3.2 6.5 7.2 1-5.2 5.1 1.2 7.2L12 18.9 5.6 21.8l1.2-7.2L1.6 9.5l7.2-1L12 2z"
                  stroke="white" stroke-width="1.6" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="titleBlock">
          <h1>Генератор описаний</h1>
        </div>
      </div>

      <div class="pill" title="Статус сервера">
        <span class="dot" id="dot"></span>
        <div>
          <div style="font-weight:900;font-size:13px;">Online</div>
          <small id="pingText">проверяем…</small>
        </div>
      </div>
    </header>

    <div class="grid">
      <section class="card">
        <div class="cardHead">
          <div>
            <h2>Параметры</h2>
            <div class="sub">Заполни поля и нажми “Сгенерировать”.</div>
          </div>

          <div class="tabs" role="tablist">
            <button class="tab active" id="tabSmartphone" type="button" data-cat="smartphone">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M8 2h8a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z" stroke="currentColor" stroke-width="1.6"/>
                <path d="M10 19h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
              Смартфон
            </button>
            <button class="tab" id="tabSneakers" type="button" data-cat="sneakers">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M4 14c2-1 3-4 3-8h4c1 4 4 7 9 8v4H4v-4z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
              </svg>
              Кроссовки
            </button>
            <button class="tab" id="tabGpu" type="button" data-cat="gpu">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M7 7h10a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2z" stroke="currentColor" stroke-width="1.6"/>
                <path d="M9 11h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                <path d="M9 13h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                <path d="M3 10v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                <path d="M21 10v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
              Видеокарта
            </button>
          </div>
        </div>

        <div class="form" id="form">
          <div class="row">
            <div>
              <label>Seed (опционально)</label>
              <input id="seed" placeholder="например 123" />
            </div>
            <div>
              <label>Кол-во (пока 1)</label>
              <input value="1" disabled />
            </div>
          </div>

          <div id="fields"></div>

          <div class="btnRow">
            <button class="btn primary" id="btnGen" type="button">
              <span class="spinner" id="sp"></span>
              <span>Сгенерировать</span>
            </button>
            <button class="btn" id="btnCopy" type="button">Скопировать</button>
            <button class="btn danger" id="btnClear" type="button">Очистить</button>
          </div>

          <div class="status" id="status"></div>
        </div>
      </section>

      <section class="card">
        <div class="cardHead">
          <div>
            <h2>Результат</h2>
            <div class="sub">Текст и история.</div>
          </div>
        </div>

        <div class="outputBox">
          <div class="shimmer" id="shimmer"></div>
          <div class="outputTitle">
            <span id="outTitle">Готово</span>
            <span class="badge" id="outBadge">—</span>
          </div>
          <div class="outputText" id="outText">Нажми “Сгенерировать”.</div>
        </div>

        <div class="history">
          <div class="historyTop">
            <div style="font-weight:900;">История</div>
            <select id="historyFilter" title="Фильтр по категории">
              <option value="">Все</option>
              <option value="smartphone">Смартфоны</option>
              <option value="sneakers">Кроссовки</option>
              <option value="gpu">Видеокарты</option>
            </select>
          </div>
          <div class="hList" id="hList"></div>
        </div>
      </section>
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="tTitle" id="toastTitle">Сообщение</div>
    <div class="tText" id="toastText"></div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  function toast(title, text){
    $("toastTitle").textContent = title;
    $("toastText").textContent = text;
    $("toast").classList.add("show");
    setTimeout(()=> $("toast").classList.remove("show"), 2600);
  }

  function setStatus(msg, ok=true){
    const el = $("status");
    el.textContent = msg || "";
    el.className = "status " + (ok ? "ok" : "err");
  }

  function setActiveTab(cat){
    const tabs = [$("tabSmartphone"), $("tabSneakers"), $("tabGpu")].filter(Boolean);
    tabs.forEach(t => t.classList.toggle("active", t.dataset.cat === cat));
  }

  const SCHEMA = {
    smartphone: [
      {k:"brand", label:"Бренд", type:"text", ph:"Samsung"},
      {k:"model", label:"Модель", type:"text", ph:"Galaxy A55"},
      {k:"screen_size_in", label:"Экран (дюймы)", type:"number", step:"0.1", ph:"6.5"},
      {k:"ram_gb", label:"RAM (ГБ)", type:"select", options:["4","6","8","12","16"]},
      {k:"storage_gb", label:"Память (ГБ)", type:"select", options:["64","128","256","512","1024"]},
      {k:"battery_mah", label:"Батарея (мА·ч)", type:"number", step:"1", ph:"5000"},
      {k:"camera_mp", label:"Камера (Мп)", type:"number", step:"1", ph:"50"},
      {k:"key_feature", label:"Особенность", type:"text", ph:"NFC, быстрая зарядка"}
    ],
    sneakers: [
      {k:"brand", label:"Бренд", type:"text", ph:"Nike"},
      {k:"model", label:"Модель", type:"text", ph:"Air Zoom"},
      {k:"purpose", label:"Назначение", type:"select", options:["города","бега","тренировок","повседневной носки","спорта"]},
      {k:"size_eu", label:"Размер EU", type:"number", step:"1", ph:"42"},
      {k:"material_upper", label:"Материал верха", type:"text", ph:"сетка/кожа"},
      {k:"season", label:"Сезон", type:"select", options:["лето","демисезон","зима","всесезон"]},
      {k:"color", label:"Цвет", type:"select", options:["черный","белый","серый","синий","бежевый","красный"]},
      {k:"key_feature", label:"Особенность", type:"text", ph:"амортизация, лёгкие"}
    ],
    gpu: [
      {k:"manufacturer", label:"Производитель", type:"text", ph:"NVIDIA / AMD"},
      {k:"version", label:"Версия", type:"text", ph:"RTX 4060 / RX 7600"},
      {k:"platform", label:"Для (ПК/ноутбук)", type:"select", options:["ПК","ноутбук"]},
      {k:"cooling", label:"Охлаждение", type:"select", options:["1 вентилятор","2 вентилятора","3 вентилятора","турбина","жидкостное"]},
      {k:"memory_gb", label:"Память (ГБ)", type:"select", options:["2","4","6","8","10","12","16","20","24"]},
      {k:"clock_mhz", label:"Частота (МГц)", type:"number", step:"1", ph:"например 2460"}
    ],
  };

  let CURRENT_CAT = "smartphone";

  function renderFields(cat){
    const wrap = $("fields");
    wrap.innerHTML = "";
    const list = SCHEMA[cat] || [];

    for(let i=0;i<list.length;i+=2){
      const row = document.createElement("div");
      row.className = "row";

      [list[i], list[i+1]].forEach(field=>{
        if(!field) return;
        const box = document.createElement("div");
        const lab = document.createElement("label");
        lab.textContent = field.label;
        box.appendChild(lab);

        let el;
        if(field.type === "select"){
          el = document.createElement("select");
          const opt0 = document.createElement("option");
          opt0.value = "";
          opt0.textContent = "— выбрать —";
          el.appendChild(opt0);
          (field.options||[]).forEach(v=>{
            const o=document.createElement("option");
            o.value=String(v); o.textContent=String(v);
            el.appendChild(o);
          });
        } else {
          el = document.createElement("input");
          el.type = field.type || "text";
          if(field.step) el.step = field.step;
          if(field.ph) el.placeholder = field.ph;
        }
        el.dataset.key = field.k;
        box.appendChild(el);
        row.appendChild(box);
      });

      wrap.appendChild(row);
    }
  }

  function getPayload(){
    const attrs = {};
    document.querySelectorAll("[data-key]").forEach(el=>{
      const k = el.dataset.key;
      const v = el.value;
      if(v !== "" && v != null) attrs[k] = v;
    });
    const seed = $("seed").value.trim();
    const payload = { category: CURRENT_CAT, attributes: attrs };
    if(seed) payload.seed = seed;
    return payload;
  }

  function setOutput(title, badge, text){
    $("outTitle").textContent = title;
    $("outBadge").textContent = badge;
    $("outText").textContent = text;
  }

  function setLoading(on){
    $("sp").style.display = on ? "inline-block" : "none";
    $("btnGen").disabled = on;
    $("shimmer").style.display = on ? "block" : "none";
    if(on) setStatus("Генерация…", true);
  }

  async function ping(){
    try{
      const r = await fetch("/ping");
      const j = await r.json();
      $("pingText").textContent = j?.message ? j.message : "ok";
      $("dot").style.background = "var(--accent2)";
    }catch(e){
      $("pingText").textContent = "offline";
      $("dot").style.background = "var(--danger)";
    }
  }

  async function generate(){
    setLoading(true);
    try{
      const payload = getPayload();
      const r = await fetch("/api/generate", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(payload),
      });
      const j = await r.json();
      if(!j.success){
        setStatus(j.error || "Ошибка", false);
        toast("Ошибка", j.error || "Не получилось");
        return;
      }
      const item = j.results?.[0];
      const desc = item?.description || "—";
      setOutput("Готово", payload.category, desc);
      setStatus("OK", true);
      await loadHistory();
    }catch(e){
      setStatus("Ошибка: " + (e?.message || e), false);
      toast("Ошибка", "Сервер может спать (free).");
    }finally{
      setLoading(false);
    }
  }

  async function loadHistory(){
    const filter = $("historyFilter").value;
    const qs = new URLSearchParams();
    qs.set("limit","20");
    if(filter) qs.set("category", filter);

    const list = $("hList");
    list.innerHTML = `<div class="badge">…</div>`;

    try{
      const r = await fetch("/api/history?" + qs.toString());
      const j = await r.json();
      if(!j.success){
        list.innerHTML = `<div class="badge">ошибка</div>`;
        return;
      }
      const items = j.history || [];
      if(items.length === 0){
        list.innerHTML = `<div class="badge">пусто</div>`;
        return;
      }

      list.innerHTML = "";
      items.forEach(it=>{
        const div = document.createElement("div");
        div.className = "hItem";
        const cat = it.category || "—";
        const dt = it.created_at ? new Date(it.created_at).toLocaleString() : "";
        const text = it.generated_text || it.description || "";

        div.innerHTML = `
          <div class="hMeta">
            <span class="badge">${cat}</span>
            <span class="badge">${dt}</span>
          </div>
          <div class="hText"></div>
        `;
        div.querySelector(".hText").textContent = text;

        div.addEventListener("click", ()=>{
          setOutput("История", cat, text);
        });

        list.appendChild(div);
      });
    }catch(e){
      list.innerHTML = `<div class="badge">offline</div>`;
    }
  }

  function copyResult(){
    const text = $("outText").textContent || "";
    if(!text.trim()){
      toast("Копирование", "Нечего копировать.");
      return;
    }
    if(navigator.clipboard?.writeText){
      navigator.clipboard.writeText(text).then(()=>{
        toast("OK", "Скопировано.");
      });
    } else {
      toast("Ошибка", "Clipboard недоступен.");
    }
  }

  function clearForm(){
    document.querySelectorAll("[data-key]").forEach(el=> el.value = "");
    $("seed").value = "";
    setOutput("Готово", "—", "Нажми “Сгенерировать”.");
    setStatus("", true);
  }

  function switchCategory(cat){
    CURRENT_CAT = cat;
    setActiveTab(CURRENT_CAT);
    renderFields(CURRENT_CAT);
    loadHistory();
  }

  $("tabSmartphone").addEventListener("click", ()=> switchCategory("smartphone"));
  $("tabSneakers").addEventListener("click", ()=> switchCategory("sneakers"));
  $("tabGpu").addEventListener("click", ()=> switchCategory("gpu"));

  $("btnGen").addEventListener("click", generate);
  $("btnCopy").addEventListener("click", copyResult);
  $("btnClear").addEventListener("click", clearForm);
  $("historyFilter").addEventListener("change", loadHistory);

  setActiveTab(CURRENT_CAT);
  renderFields(CURRENT_CAT);
  ping();
  loadHistory();
</script>
</body>
</html>
